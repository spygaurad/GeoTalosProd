# =============================================================================
# Alembic configuration — Application DB only
# pgSTAC manages its own schema on the STAC DB.
# =============================================================================

[alembic]
script_location = alembic
file_template = %%(rev)s_%%(slug)s
prepend_sys_path = .
version_path_separator = os

# URL is read from APP_DATABASE_URL env var in alembic/env.py → get_url().
# This value is OVERRIDDEN at runtime and should never be relied upon.
sqlalchemy.url = OVERRIDDEN_BY_ENV

[post_write_hooks]

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S

# =============================================================================
# AwakeForest Geospatial Platform — Docker Compose
# =============================================================================
#
# SERVICES
# ────────
#  Databases  : app-db  (PostgreSQL 17 + PostGIS 3.5)
#               stac-db (pgSTAC v0.9.10)
#  STAC layer : stac-api (stac-fastapi-pgstac 6.2.2)
#               titiler  (titiler-pgstac 2.1.0)
#  Broker     : redis    (Redis 7.2)
#  Storage    : minio    (S3-compatible)
#               minio-setup (one-shot bucket initialisation)
#  App        : api      (FastAPI — hot-reload in dev)
#  Workers    : celery-worker-ingestion
#               celery-worker-bulk
#               celery-worker-analysis  (also handles discovery queue)
#               celery-worker-inference
#               celery-worker-default
#               celery-beat             (scheduled tasks)
#               flower                  (Celery monitoring UI → :5555)
#
# NETWORKS
# ────────
#  awakeforest-backend  — app-db · redis · api · all workers · beat · flower · martin
#  awakeforest-stac     — stac-db · stac-api · titiler · api · ingestion/analysis workers
#  awakeforest-storage  — minio · titiler · api · ingestion/bulk/analysis/inference workers
#
# QUICK START
# ───────────
#  cp .env.docker .env          # fill in secrets
#  docker compose up -d
#  docker compose logs -f api   # tail a single service
#
# =============================================================================

# ── Shared build context for all app services ─────────────────────────────────
x-app-build: &app-build
  build:
    context: .
    dockerfile: Dockerfile
  restart: unless-stopped

# ── Shared environment for all app services ───────────────────────────────────
x-app-env: &app-env
  # Application DB (asyncpg — RLS enforced via app_user)
  APP_DATABASE_URL: postgresql+asyncpg://app_user:${APP_USER_PASSWORD:-app_pass}@app-db:5432/geoplat
  # STAC Catalog DB — write path
  STAC_DATABASE_URL: postgresql+asyncpg://pgstac_ingest:${STAC_INGEST_PASSWORD:-ingest_pass}@stac-db:5432/pgstac
  # STAC Catalog DB — read-only pool
  STAC_READ_URL: postgresql+asyncpg://pgstac_read:${STAC_READ_PASSWORD:-read_pass}@stac-db:5432/pgstac
  # STAC Catalog DB — sync psycopg2 DSN for pypgstac inside Celery workers
  STAC_SYNC_DATABASE_URL: postgresql://pgstac_ingest:${STAC_INGEST_PASSWORD:-ingest_pass}@stac-db:5432/pgstac
  # Celery worker DB (psycopg2 sync — BYPASSRLS role)
  CELERY_DATABASE_URL: postgresql+psycopg2://celery_worker:${CELERY_WORKER_PASSWORD:-celery_pass}@app-db:5432/geoplat
  # Broker / result backend
  REDIS_URL: redis://:${REDIS_PASSWORD:-redis_pass}@redis:6379/0
  # Internal service URLs
  STAC_API_URL: http://stac-api:8080
  TITILER_URL: http://titiler:8000
  TITILER_WORKERS: ${TITILER_WORKERS:-2}
  # Public URL of the main API — used to rewrite TiTiler tile URLs in tilejson
  # responses so browsers call the tile proxy instead of titiler directly.
  # Override in staging/production with the real domain (no trailing slash).
  PUBLIC_API_URL: ${PUBLIC_API_URL:-http://localhost:2030}
  # MinIO (S3-compatible) — path-style access for local use
  AWS_ENDPOINT_URL: http://minio:9000
  AWS_REGION: ${AWS_REGION:-us-east-1}
  AWS_ACCESS_KEY_ID: ${MINIO_ROOT_USER:-minioadmin}
  AWS_SECRET_ACCESS_KEY: ${MINIO_ROOT_PASSWORD:-minioadmin_pass}
  # Path-style is required for MinIO. When migrating to AWS S3 in production,
  # set this to "false" (virtual-hosted style) for most regions.
  AWS_S3_FORCE_PATH_STYLE: "true"
  S3_BUCKET_PREFIX: ${S3_BUCKET_PREFIX:-org-}
  # Public MinIO URL used in presigned URLs returned to browsers.
  # Must be reachable from the browser, not the container network.
  PUBLIC_MINIO_URL: ${PUBLIC_MINIO_URL:-http://localhost:9002}
  # CORS origins allowed for direct browser uploads via presigned URLs.
  # Must match the frontend origin (e.g. http://localhost:3000 in dev).
  MINIO_CORS_ALLOW_ORIGIN: ${MINIO_CORS_ALLOW_ORIGIN:-*}
  # Auth
  CLERK_SECRET_KEY: ${CLERK_SECRET_KEY:-}
  CLERK_WEBHOOK_SECRET: ${CLERK_WEBHOOK_SECRET:-}
  CLERK_FRONTEND_API: ${CLERK_FRONTEND_API:-}
  INTERNAL_API_KEY: ${INTERNAL_API_KEY:-}
  # Security
  API_KEY_SALT: ${API_KEY_SALT:-changeme_32_byte_hex_string_here}
  # Runtime
  ENVIRONMENT: ${ENVIRONMENT:-development}
  LOG_LEVEL: ${LOG_LEVEL:-INFO}

services:

  # ============================================================================
  # DATABASES
  # ============================================================================

  app-db:
    image: postgis/postgis:17-3.5
    container_name: awakeforest-app-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: geoplat
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${APP_DB_SUPERUSER_PASSWORD:-postgres}
      # Passed through to the init script so it can set role passwords
      APP_USER_PASSWORD: ${APP_USER_PASSWORD:-app_pass}
      CELERY_WORKER_PASSWORD: ${CELERY_WORKER_PASSWORD:-celery_pass}
      MARTIN_READER_PASSWORD: ${MARTIN_READER_PASSWORD:-martin_pass}
    volumes:
      - app-db-data:/var/lib/postgresql/data
      - ./infra/docker/app-db/init:/docker-entrypoint-initdb.d:ro
      - ./infra/docker/app-db/config/postgresql.custom.conf:/etc/postgresql/postgresql.conf:ro
    command: postgres -c 'config_file=/etc/postgresql/postgresql.conf'
    ports:
      - "${APP_DB_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d geoplat"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - awakeforest-backend
    labels:
      com.awakeforest.service: app-db
      com.awakeforest.role: database

  stac-db:
    image: ghcr.io/stac-utils/pgstac:v0.9.10
    container_name: awakeforest-stac-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: pgstac
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${STAC_DB_SUPERUSER_PASSWORD:-pgstac_admin}
      PGUSER: postgres
      PGPASSWORD: ${STAC_DB_SUPERUSER_PASSWORD:-pgstac_admin}
      PGDATABASE: pgstac
      # Passed through to init script for role creation
      STAC_INGEST_PASSWORD: ${STAC_INGEST_PASSWORD:-ingest_pass}
      STAC_READ_PASSWORD: ${STAC_READ_PASSWORD:-read_pass}
    volumes:
      - stac-db-data:/var/lib/postgresql/data
      - ./infra/docker/stac-db/init:/docker-entrypoint-initdb.d:ro
    ports:
      - "${STAC_DB_PORT:-5433}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d pgstac"]
      interval: 10s
      timeout: 5s
      retries: 8
      # pgSTAC schema migration runs on first start and can be slow on low-spec
      # hardware — 60 s gives the planner time to finish before dependants start.
      start_period: 60s
    networks:
      - awakeforest-stac
    labels:
      com.awakeforest.service: stac-db
      com.awakeforest.role: database

  stac-db-migrate:
    <<: *app-build
    container_name: awakeforest-stac-db-migrate
    environment:
      <<: *app-env
      STAC_DB_SUPERUSER_PASSWORD: ${STAC_DB_SUPERUSER_PASSWORD:-pgstac_admin}
    volumes:
      - ./infra/docker/stac-db/migrate/migrate.py:/migrate.py:ro   # mount the script
    command: python /migrate.py
    depends_on:
      stac-db:
        condition: service_healthy
    restart: "no"
    networks:
      - awakeforest-stac
      
  # ============================================================================
  # STAC LAYER
  # ============================================================================

  stac-api:
    # stac-fastapi-pgstac 6.2.2
    image: ghcr.io/stac-utils/stac-fastapi-pgstac:6.2.2
    container_name: awakeforest-stac-api
    restart: unless-stopped
    environment:
      POSTGRES_USER: pgstac_ingest
      POSTGRES_PASS: ${STAC_INGEST_PASSWORD:-ingest_pass}
      POSTGRES_DBNAME: pgstac
      POSTGRES_HOST_READER: stac-db
      POSTGRES_HOST_WRITER: stac-db
      POSTGRES_PORT: 5432
      DB_MIN_CONN_SIZE: ${STAC_API_DB_MIN_CONN:-1}
      DB_MAX_CONN_SIZE: ${STAC_API_DB_MAX_CONN:-10}
      USE_API_HYDRATE: "false"
      ENABLE_DIRECT_RESPONSE: "true"
      WEB_CONCURRENCY: ${STAC_API_WEB_CONCURRENCY:-2}
    ports:
      - "${STAC_API_PORT:-8081}:8080"
    depends_on:
      stac-db:
        condition: service_healthy
    networks:
      - awakeforest-stac
    labels:
      com.awakeforest.service: stac-api
      com.awakeforest.role: stac

  titiler:
    # titiler-pgstac 2.1.0
    # In 2.x the image no longer auto-starts with PORT env var — explicit command required.
    image: ghcr.io/stac-utils/titiler-pgstac:2.1.0
    # platform: linux/amd64
    container_name: awakeforest-titiler
    restart: unless-stopped
    mem_limit: 12g
    command: >
      gunicorn -k uvicorn.workers.UvicornWorker
      titiler.pgstac.main:app
      --bind 0.0.0.0:8000
      --workers ${TITILER_WORKERS:-2}
      --timeout 120
      --access-logfile -
      --access-logformat '%(h)s %(l)s %(u)s %(t)s "%(r)s" %(s)s %(b)s "%(f)s" "%(a)s" %(D)s'
    environment:
      PGUSER: pgstac_read
      PGPASSWORD: ${STAC_READ_PASSWORD:-read_pass}
      PGDATABASE: pgstac
      PGHOST: stac-db
      PGPORT: 5432
      PGOPTIONS: -c search_path=pgstac,public
      DB_MIN_CONN_SIZE: ${TITILER_DB_MIN_CONN:-1}
      DB_MAX_CONN_SIZE: ${TITILER_DB_MAX_CONN:-5}
      MOSAIC_CONCURRENCY: ${TITILER_MOSAIC_CONCURRENCY:-4}
      # GDAL performance tuning
      CPL_TMPDIR: /tmp
      GDAL_CACHEMAX: ${GDAL_CACHEMAX:-512}
      GDAL_INGESTED_BYTES_AT_OPEN: 32768
      GDAL_DISABLE_READDIR_ON_OPEN: EMPTY_DIR
      GDAL_HTTP_MERGE_CONSECUTIVE_RANGES: "YES"
      GDAL_HTTP_MULTIPLEX: "YES"
      GDAL_HTTP_VERSION: "2"
      VSI_CACHE: "TRUE"
      VSI_CACHE_SIZE: "${VSI_CACHE_SIZE:-536870912}"
      CPL_VSIL_CURL_CACHE_SIZE: "${CPL_VSIL_CURL_CACHE_SIZE:-200000000}"
      # MinIO/S3 — boto3 uses AWS_ENDPOINT_URL; GDAL/VSI uses AWS_S3_ENDPOINT (host:port, no protocol)
      AWS_ACCESS_KEY_ID: ${MINIO_ROOT_USER:-minioadmin}
      AWS_SECRET_ACCESS_KEY: ${MINIO_ROOT_PASSWORD:-minioadmin_pass}
      AWS_ENDPOINT_URL: http://minio:9000
      AWS_S3_ENDPOINT: minio:9000
      AWS_REGION: ${AWS_REGION:-us-east-1}
      AWS_HTTPS: "NO"
      AWS_VIRTUAL_HOSTING: "FALSE"
      AWS_S3_FORCE_PATH_STYLE: "true"
    ports:
      - "${TITILER_PORT:-8082}:8000"
    depends_on:
      stac-db:
        condition: service_healthy
      stac-db-migrate:
        condition: service_completed_successfully
      minio:
        condition: service_healthy
    healthcheck:
      # 2.x has no /healthz — use root landing page
      test: ["CMD-SHELL", "curl -sf http://localhost:8000/ || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 60s
    networks:
      - awakeforest-stac
      - awakeforest-storage
    labels:
      com.awakeforest.service: titiler
      com.awakeforest.role: tile-server

  # ============================================================================
  # CACHE / MESSAGE BROKER
  # ============================================================================

  redis:
    image: redis:7.2-alpine
    container_name: awakeforest-redis
    restart: unless-stopped
    command: >
      redis-server
      --appendonly yes
      --appendfsync everysec
      --maxmemory ${REDIS_MAXMEM:-512mb}
      --maxmemory-policy allkeys-lru
      --requirepass ${REDIS_PASSWORD:-redis_pass}
    volumes:
      - redis-data:/data
    ports:
      - "${REDIS_PORT:-6379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-redis_pass}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - awakeforest-backend
    labels:
      com.awakeforest.service: redis
      com.awakeforest.role: broker

  # ============================================================================
  # OBJECT STORAGE  (MinIO — S3-compatible)
  # ============================================================================

  minio:
    image: minio/minio:RELEASE.2025-09-07T16-13-09Z
    container_name: awakeforest-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin_pass}
      MINIO_REGION: ${AWS_REGION:-us-east-1}
      # Do NOT set MINIO_DOMAIN here. That flag enables virtual-hosted-style routing
      # (bucket.minio:9000), which is the opposite of what we want.
      # Path-style access is enforced client-side via AWS_S3_FORCE_PATH_STYLE=true.
    volumes:
      - minio-data:/data
    ports:
      - "${MINIO_API_PORT:-9000}:9000"     # S3 API
      - "${MINIO_CONSOLE_PORT:-9001}:9001" # Web console
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9000/minio/health/live"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - awakeforest-storage
    labels:
      com.awakeforest.service: minio
      com.awakeforest.role: storage

  # One-shot container: creates the shared exports bucket.
  # Per-org buckets (org-{org_id}) are created at runtime by the application.
  minio-setup:
    image: minio/mc:RELEASE.2025-08-13T08-35-41Z
    container_name: awakeforest-minio-setup
    restart: "no"
    tty: true
    depends_on:
      minio:
        condition: service_healthy
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin_pass}
      MINIO_CORS_ALLOW_ORIGIN: ${MINIO_CORS_ALLOW_ORIGIN:-*}
    entrypoint: >
      /bin/sh -c "
        set -e
        mc alias set local http://minio:9000 $$MINIO_ROOT_USER $$MINIO_ROOT_PASSWORD

        # Create required buckets
        mc mb --ignore-existing local/awakeforest-exports
        mc mb --ignore-existing local/awakeforest-jobs
        mc mb --ignore-existing local/org-00000000-0000-0000-0000-000000000001

        # ---- APPLY ALL GLOBAL CORS SETTINGS IN ONE SHOT ----
        echo 'Configuring global CORS...'
        mc admin config set local api \
          cors_allow_origin=\"$$MINIO_CORS_ALLOW_ORIGIN\" \
          cors_allow_methods=\"GET,PUT,POST,HEAD\" \
          cors_allow_headers=\"*\" \
          cors_expose_headers=\"ETag\" \
          cors_max_age=\"3600\"

        # Restart MinIO to apply changes
        echo 'Restarting MinIO...'
        mc --quiet admin service restart local

        echo '✓ MinIO buckets and global CORS ready.'
        exit 0
      "
    networks:
      - awakeforest-storage
    labels:
      com.awakeforest.service: minio-setup
      com.awakeforest.role: init

  # ============================================================================
  # APPLICATION — FastAPI
  # ============================================================================
  api:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        INSTALL_DEV: "true"
    restart: unless-stopped
    container_name: awakeforest-api
    environment:
      <<: *app-env
    # --reload watches for source changes; remove in staging/production
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    volumes:
      - .:/app  # mount source for hot-reload in development
    ports:
      - "${API_PORT:-8000}:8000"
    depends_on:
      app-db:
        condition: service_healthy
      stac-db:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
      titiler:
        condition: service_healthy
    networks:
      - awakeforest-backend
      - awakeforest-stac
      - awakeforest-storage
    labels:
      com.awakeforest.service: api
      com.awakeforest.role: application

  # ============================================================================
  # CELERY WORKERS
  # Each worker is pinned to one or two logically related queues so that
  # queue-specific concurrency and autoscaling can be tuned independently.
  # ============================================================================

  celery-worker-ingestion:
    # Queues: ingestion, discovery
    # Handles: dataset ingest (rasterio/pgSTAC writes) + relationship discovery
    <<: *app-build
    container_name: awakeforest-worker-ingestion
    environment:
      <<: *app-env
    command: >
      celery -A app.workers.celery_app worker
      --loglevel=${LOG_LEVEL:-INFO}
      --queues=ingestion,discovery
      --concurrency=${WORKER_CONCURRENCY_INGESTION:-4}
      --hostname=ingestion@%h
    volumes:
      - .:/app  # mount source for development — keeps worker code in sync with API
    depends_on:
      app-db:
        condition: service_healthy
      stac-db:
        condition: service_healthy
      stac-db-migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    networks:
      - awakeforest-backend
      - awakeforest-stac
      - awakeforest-storage
    labels:
      com.awakeforest.service: celery-worker-ingestion
      com.awakeforest.role: worker

  celery-worker-bulk:
    # Queues: bulk
    # Handles: bulk annotation import / update / delete / export
    <<: *app-build
    container_name: awakeforest-worker-bulk
    environment:
      <<: *app-env
    command: >
      celery -A app.workers.celery_app worker
      --loglevel=${LOG_LEVEL:-INFO}
      --queues=bulk
      --concurrency=${WORKER_CONCURRENCY_BULK:-4}
      --hostname=bulk@%h
    volumes:
      - .:/app
    depends_on:
      app-db:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    networks:
      - awakeforest-backend
      - awakeforest-storage
    labels:
      com.awakeforest.service: celery-worker-bulk
      com.awakeforest.role: worker

  celery-worker-analysis:
    # Queues: analysis
    # Handles: timeseries, change detection, annotation stats refresh
    # Needs stac-db for STAC item queries and minio for raw raster reads.
    <<: *app-build
    container_name: awakeforest-worker-analysis
    environment:
      <<: *app-env
    command: >
      celery -A app.workers.celery_app worker
      --loglevel=${LOG_LEVEL:-INFO}
      --queues=analysis,automation
      --concurrency=${WORKER_CONCURRENCY_ANALYSIS:-4}
      --hostname=analysis@%h
    volumes:
      - .:/app
    depends_on:
      app-db:
        condition: service_healthy
      stac-db:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    networks:
      - awakeforest-backend
      - awakeforest-stac
      - awakeforest-storage
    labels:
      com.awakeforest.service: celery-worker-analysis
      com.awakeforest.role: worker

  celery-worker-inference:
    # Queues: inference
    # Handles: ML model inference, writes results back to S3 + annotations
    # Add 'deploy.resources.reservations.devices' here for GPU access
    <<: *app-build
    container_name: awakeforest-worker-inference
    environment:
      <<: *app-env
    command: >
      celery -A app.workers.celery_app worker
      --loglevel=${LOG_LEVEL:-INFO}
      --queues=inference
      --concurrency=${WORKER_CONCURRENCY_INFERENCE:-2}
      --hostname=inference@%h
    volumes:
      - .:/app
    depends_on:
      app-db:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    networks:
      - awakeforest-backend
      - awakeforest-storage
    labels:
      com.awakeforest.service: celery-worker-inference
      com.awakeforest.role: worker

  celery-worker-default:
    # Queues: default
    # Handles: notifications, cache refresh, cleanup, alert dispatch
    <<: *app-build
    container_name: awakeforest-worker-default
    environment:
      <<: *app-env
    command: >
      celery -A app.workers.celery_app worker
      --loglevel=${LOG_LEVEL:-INFO}
      --queues=default
      --concurrency=${WORKER_CONCURRENCY_DEFAULT:-2}
      --hostname=default@%h
    volumes:
      - .:/app
    depends_on:
      app-db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - awakeforest-backend
    labels:
      com.awakeforest.service: celery-worker-default
      com.awakeforest.role: worker

  celery-beat:
    # Periodic task scheduler — runs annotation_statistics refresh and other
    # beat tasks defined in app/workers/celery_app.py beat_schedule.
    # Only ever run ONE instance of this service.
    <<: *app-build
    container_name: awakeforest-celery-beat
    environment:
      <<: *app-env
    command: >
      celery -A app.workers.celery_app beat
      --loglevel=${LOG_LEVEL:-INFO}
      --schedule=/var/celerybeat/celerybeat-schedule
    volumes:
      - .:/app
      - celerybeat-schedule:/var/celerybeat  # persist schedule file across restarts
    depends_on:
      app-db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - awakeforest-backend
    labels:
      com.awakeforest.service: celery-beat
      com.awakeforest.role: scheduler

  # ============================================================================
  # MONITORING
  # ============================================================================

  flower:
    # Celery task monitoring — http://localhost:5555
    <<: *app-build
    container_name: awakeforest-flower
    environment:
      <<: *app-env
      FLOWER_BASIC_AUTH: ${FLOWER_USER:-admin}:${FLOWER_PASSWORD:-flower_pass}
    command: >
      celery -A app.workers.celery_app flower
      --port=5555
      --broker_api=redis://:${REDIS_PASSWORD:-redis_pass}@redis:6379/0
    volumes:
      - .:/app
    ports:
      - "${FLOWER_PORT:-5555}:5555"
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - awakeforest-backend
    labels:
      com.awakeforest.service: flower
      com.awakeforest.role: monitoring

  # ============================================================================
  # VECTOR TILES (Martin)
  # ============================================================================

  martin:
    image: ghcr.io/maplibre/martin:1.4.0
    container_name: awakeforest-martin
    restart: unless-stopped
    environment:
      # Dedicated read-only role (BYPASSRLS, SELECT-only).
      # Never use celery_worker here — it has write access and BYPASSRLS.
      DATABASE_URL: postgresql://martin_reader:${MARTIN_READER_PASSWORD:-martin_pass}@app-db:5432/geoplat
      PORT: 3000
    # Explicit config — prevents auto-discovery from exposing unintended tables.
    command: --config /config.yaml
    volumes:
      - ./infra/docker/martin/config.yaml:/config.yaml:ro
    ports:
      - "${MARTIN_PORT:-3000}:3000"
    depends_on:
      app-db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:3000/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - awakeforest-backend
    labels:
      com.awakeforest.service: martin
      com.awakeforest.role: tile-server

# =============================================================================
# VOLUMES
# =============================================================================

volumes:
  app-db-data:
    name: awakeforest-app-db-data
  stac-db-data:
    name: awakeforest-stac-db-data
  redis-data:
    name: awakeforest-redis-data
  minio-data:
    name: awakeforest-minio-data
  celerybeat-schedule:
    name: awakeforest-celerybeat-schedule

# =============================================================================
# NETWORKS
# =============================================================================
#
#  awakeforest-backend  — primary app plane
#    app-db · redis · api · all workers · beat · flower
#
#  awakeforest-stac     — STAC catalog plane
#    stac-db · stac-api · titiler · api · ingestion worker · analysis worker
#
#  awakeforest-storage  — object storage plane
#    minio · minio-setup · titiler · api
#    ingestion worker (writes STAC + VRT) · bulk worker (exports)
#    analysis worker (reads rasters for timeseries / change detection)
#    inference worker (reads rasters, writes results)
#
# Services join only the networks they actually need; the stac-api has no
# route to redis, and the default worker has no route to minio or stac.
# =============================================================================

networks:
  awakeforest-backend:
    name: awakeforest-backend
    driver: bridge

  awakeforest-stac:
    name: awakeforest-stac
    driver: bridge

  awakeforest-storage:
    name: awakeforest-storage
    driver: bridge

# =============================================================================
# Martin vector tile server configuration
# https://maplibre.org/martin/config-file.html
#
# Martin connects to app-db with the martin_reader role (SELECT-only,
# BYPASSRLS).  It serves PostGIS geometry columns as Mapbox Vector Tiles.
#
# DATABASE_URL is injected by docker-compose from the MARTIN_READER_PASSWORD
# environment variable — this file controls *which* tables are exposed and
# how, not the connection credentials.
# =============================================================================

# Worker threads
worker_processes: 1

# HTTP keep-alive timeout in seconds
keep_alive: 75

# PostGIS sources — explicit list prevents accidental exposure of system
# tables, audit logs, or tables with no geometry.
postgres:
  # Martin v1.4+ requires the connection string in the config when a config
  # file is loaded — DATABASE_URL env var is ignored in that case.
  # The ${DATABASE_URL} syntax is supported natively by martin's config loader.
  connection_string: ${DATABASE_URL}

  # Maximum pool size per worker
  pool_size: 5

  # Tables to expose as vector tile sources.
  # Each entry maps to a tile source at /martin/<source_id>/{z}/{x}/{y}
  #
  # NOTE: the raw `annotations` table is intentionally NOT exposed.  Martin
  # connects with the martin_reader role (BYPASSRLS) so it cannot evaluate
  # the per-request RLS session variable; exposing the table directly would
  # leak rows across organizations.  Annotations are served via the
  # `annotation_set_mvt` function source (auto-discovered from migration 036)
  # behind the FastAPI tile proxy at
  # GET /api/v1/annotation-sets/{set_id}/tiles/{z}/{x}/{y}.pbf
  # which authenticates the request and verifies org ownership of the set
  # before forwarding to Martin.
  tables:
    # Dataset spatial extents — used for rendering dataset coverage on the map
    datasets:
      schema: public
      table: datasets
      srid: 4326
      geometry_column: geometry
      geometry_type: Polygon

    # Static vector features (roads, buildings, boundaries)
    feature_layers:
      schema: public
      table: feature_layers
      srid: 4326
      geometry_column: geometry
      geometry_type: Geometry

  # Function sources — parameterised SQL functions returning ST_AsMVT bytes.
  functions:
    # Per-set annotation tiles.  Filtered server-side by `set_id` query
    # parameter; tenant isolation is enforced by the FastAPI tile proxy
    # (see app/api/v1/endpoints/annotation_sets.py).
    annotation_set_mvt:
      schema: public
      function: annotation_set_mvt
